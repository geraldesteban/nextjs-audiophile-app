name: Audiophile App CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install

      # ✅ Start local server (if your app needs localhost)
      - name: Start dev server
        run: npm start &

      # 🔨 Build project
      - name: Build project
        run: npm run build
